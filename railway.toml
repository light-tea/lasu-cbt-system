[deploy]
startCommand = "php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/up"
healthcheckTimeout = 300

[build]
buildCommand = "composer install --no-dev --optimize-autoloader && php artisan view:clear && php artisan config:cache && php artisan route:cache"